# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
font_size        12
adjust_line_height 1
adjust_column_width 1

# Cursor
cursor_shape     block
cursor_blink_interval 0

# Colors: Soft Pastel Retro
foreground       #dcd7ba
background       #1a1a1a
background_opacity 0.85

selection_foreground #1a1a1a
selection_background #dcd7ba

# ANSI Colors
color0  #1a1a1a
color1  #d78787
color2  #a7c080
color3  #e4c9af
color4  #89beba
color5  #d3a0bc
color6  #95c4ce
color7  #eeeeee

color8  #666666
color9  #f29e9e
color10 #c2d9a0
color11 #ffe8c3
color12 #aadadb
color13 #f4b8e4
color14 #c3e7f0
color15 #ffffff

# Window appearance
window_padding_width 5
hide_window_decorations yes

# Scrolling
scrollback_lines 10000
enable_audio_bell no

# Tabs
tab_bar_edge           bottom
tab_bar_style          separator
active_tab_foreground  #1a1a1a
active_tab_background  #aadadb
inactive_tab_foreground #999999
inactive_tab_background #1a1a1a

